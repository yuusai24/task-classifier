<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>講座アーカイブ</title>
<style>
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #e8f4fd;
    color: #333;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .title-block {
    background: #ff00ff;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .title-block .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    opacity: 0.85;
    margin-bottom: 6px;
  }
  .title-block h1 {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    margin: 0;
    line-height: 1.4;
  }
  .section {
    background: #fff;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .section-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .section-title {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }
  .section-gain .section-icon { background: #c1ff72; }
  .section-gain .section-title { color: #2e7d32; }
  .section-gain { border-left: 4px solid #c1ff72; }
  .section-points .section-icon { background: #fff8e1; }
  .section-points .section-title { color: #b8860b; }
  .section-points { border-left: 4px solid #c8a96e; }
  .section-steps .section-icon { background: #e3f2fd; }
  .section-steps .section-title { color: #1565c0; }
  .section-steps { border-left: 4px solid #2196f3; }
  .section-memo .section-icon { background: #fce4ec; }
  .section-memo .section-title { color: #b71c1c; }
  .section-memo { border-left: 4px solid #e91e63; }
  .section p {
    font-size: 14px;
    line-height: 1.8;
    margin: 0;
    color: #444;
  }
  .point-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .point-list li {
    font-size: 14px;
    line-height: 1.7;
    color: #444;
    padding: 6px 0 6px 20px;
    position: relative;
    border-bottom: 1px solid #f0f0f0;
  }
  .point-list li:last-child { border-bottom: none; }
  .point-list li::before {
    content: '◆';
    position: absolute;
    left: 0;
    color: #c8a96e;
    font-size: 10px;
    top: 9px;
  }
  .step-list {
    list-style: none;
    padding: 0;
    margin: 0;
    counter-reset: step;
  }
  .step-list li {
    font-size: 14px;
    line-height: 1.7;
    color: #444;
    padding: 8px 0 8px 40px;
    position: relative;
    border-bottom: 1px solid #f0f0f0;
    counter-increment: step;
  }
  .step-list li:last-child { border-bottom: none; }
  .step-list li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    width: 26px;
    height: 26px;
    background: #2196f3;
    color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    top: 7px;
  }
  .memo-text {
    font-size: 15px;
    font-weight: 700;
    color: #c2185b;
    line-height: 1.8;
    margin: 0;
  }
</style>
</head>
<body>

  <!-- =============================================
    【差し替えエリア①】講座タイトル
    ↓ここを毎回書き換える↓
  ============================================= -->
  <div class="title-block">
    <div class="label">ARCHIVE</div>
    <h1>金運爆上げ強化月間</h1>
  </div>
  <!-- ============================================= -->

  <!-- =============================================
    【差し替えエリア②】この講座で得られること
    ↓<p>〜</p>の中身を毎回書き換える↓
  ============================================= -->
  <div class="section section-gain">
    <div class="section-header">
      <div class="section-icon">✨</div>
      <div class="section-title">この講座で得られること</div>
    </div>
    <p>ここに「得られること」のテキストを入れる。</p>
  </div>
  <!-- ============================================= -->

  <!-- =============================================
    【差し替えエリア③】重要ポイント
    ↓<li>を増やしたり減らしたりしてOK（5〜7個）↓
  ============================================= -->
  <div class="section section-points">
    <div class="section-header">
      <div class="section-icon">💡</div>
      <div class="section-title">重要ポイント</div>
    </div>
    <ul class="point-list">
      <li>ポイント1</li>
      <li>ポイント2</li>
      <li>ポイント3</li>
      <li>ポイント4</li>
      <li>ポイント5</li>
    </ul>
  </div>
  <!-- ============================================= -->

  <!-- =============================================
    【差し替えエリア④】実践ステップ
    ↓<li>を増やしたり減らしたりしてOK↓
  ============================================= -->
  <div class="section section-steps">
    <div class="section-header">
      <div class="section-icon">📋</div>
      <div class="section-title">実践ステップ</div>
    </div>
    <ol class="step-list">
      <li>ステップ1</li>
      <li>ステップ2</li>
      <li>ステップ3</li>
      <li>ステップ4</li>
    </ol>
  </div>
  <!-- ============================================= -->

  <!-- =============================================
    【差し替えエリア⑤】受講生への一言メモ
    ↓<p>〜</p>の中身を毎回書き換える↓
  ============================================= -->
  <div class="section section-memo">
    <div class="section-header">
      <div class="section-icon">💌</div>
      <div class="section-title">受講生への一言メモ</div>
    </div>
    <p class="memo-text">ここに一言メモを入れる。</p>
  </div>
  <!-- ============================================= -->

</body>
</html>
