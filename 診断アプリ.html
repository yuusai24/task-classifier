<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたの「勇者・姫・魔法使い」タイプ診断</title>
<style>
  :root {
    --fire: #ff6b35;
    --fire-light: #fff0ea;
    --water: #4facfe;
    --water-light: #eaf6ff;
    --both: #a78bfa;
    --both-light: #f5f0ff;
    --dark: #1a1a2e;
    --gray: #6b7280;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  /* === COVER === */
  #cover {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 48px 32px 40px;
    text-align: center;
    backdrop-filter: blur(12px);
  }

  .cover-icon { font-size: 64px; margin-bottom: 20px; }

  .cover-title {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    line-height: 1.5;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }

  .cover-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .type-preview {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }

  .type-card {
    flex: 1;
    padding: 12px 8px;
    border-radius: 16px;
    text-align: center;
  }

  .type-card.fire { background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.3); }
  .type-card.water { background: rgba(79,172,254,0.15); border: 1px solid rgba(79,172,254,0.3); }
  .type-card.both { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); }

  .type-card .emoji { font-size: 28px; margin-bottom: 6px; }
  .type-card .name { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .type-card .desc { font-size: 10px; color: rgba(255,255,255,0.5); line-height: 1.5; }

  .start-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(90deg, #ff6b35, #a78bfa, #4facfe);
    background-size: 200% auto;
    color: #fff;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.3s;
    animation: gradientMove 3s ease infinite;
  }

  @keyframes gradientMove {
    0% { background-position: 0% center; }
    50% { background-position: 100% center; }
    100% { background-position: 0% center; }
  }

  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(167,139,250,0.4); }

  /* === QUIZ === */
  #quiz { display: none; }

  .progress-wrap {
    margin-bottom: 24px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label { font-size: 12px; color: rgba(255,255,255,0.5); }
  .progress-count { font-size: 13px; font-weight: 700; color: #fff; }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6b35, #a78bfa, #4facfe);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .question-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 32px 28px 28px;
    backdrop-filter: blur(12px);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-num {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    color: #a78bfa;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .question-text {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .choices { display: flex; flex-direction: column; gap: 12px; }

  .choice-btn {
    width: 100%;
    padding: 16px 20px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .choice-btn:hover {
    border-color: #a78bfa;
    background: rgba(167,139,250,0.1);
    transform: translateX(4px);
  }

  .choice-btn.selected-fire {
    border-color: #ff6b35;
    background: rgba(255,107,53,0.12);
    color: #fff;
  }

  .choice-btn.selected-water {
    border-color: #4facfe;
    background: rgba(79,172,254,0.12);
    color: #fff;
  }

  .choice-letter {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 900;
    color: rgba(255,255,255,0.5);
  }

  /* === RESULT === */
  #result { display: none; animation: fadeIn 0.5s ease; }

  .result-card {
    border-radius: 24px;
    padding: 0 0 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .result-card.fire { background: linear-gradient(145deg, #1a1a2e, #2d1810); border: 1px solid rgba(255,107,53,0.4); }
  .result-card.water { background: linear-gradient(145deg, #0d1b2e, #102040); border: 1px solid rgba(79,172,254,0.4); }
  .result-card.both { background: linear-gradient(145deg, #1a1830, #201535); border: 1px solid rgba(167,139,250,0.4); }

  /* ヒーローエリア */
  .result-hero {
    position: relative;
    margin-bottom: 0;
  }
  .result-hero img {
    width: 100%;
    display: block;
    max-height: 280px;
    object-fit: cover;
  }
  .result-hero-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 40px 24px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
  }
  .result-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .result-card.fire .result-badge { background: rgba(255,107,53,0.3); color: #ff9a5c; }
  .result-card.water .result-badge { background: rgba(79,172,254,0.3); color: #7dd4ff; }
  .result-card.both .result-badge { background: rgba(167,139,250,0.3); color: #c4b5fd; }

  .result-type-name {
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 4px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .result-type-sub {
    font-size: 13px;
    opacity: 0.8;
  }
  .result-card.fire .result-type-sub { color: #ff9a5c; }
  .result-card.water .result-type-sub { color: #7dd4ff; }
  .result-card.both .result-type-sub { color: #c4b5fd; }

  .result-body { padding: 24px 20px 0; }

  /* 割合グラフ */
  .ratio-section {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .ratio-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .ratio-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .ratio-bar {
    flex: 1;
    height: 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .ratio-fire {
    height: 100%;
    background: linear-gradient(90deg, #ff6b35, #ff9a5c);
    border-radius: 12px;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    position: absolute; left: 0; top: 0;
  }
  .ratio-water {
    height: 100%;
    background: linear-gradient(90deg, #4facfe, #7dd4ff);
    border-radius: 12px;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    position: absolute; right: 0; top: 0;
  }
  .ratio-labels {
    display: flex;
    justify-content: space-between;
  }
  .ratio-label-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
  }
  .ratio-dot-fire { width: 10px; height: 10px; border-radius: 50%; background: #ff6b35; }
  .ratio-dot-water { width: 10px; height: 10px; border-radius: 50%; background: #4facfe; }
  .ratio-pct-fire { color: #ff9a5c; }
  .ratio-pct-water { color: #7dd4ff; }

  /* 説明文 */
  .result-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    line-height: 1.9;
    text-align: left;
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 20px;
  }

  /* セクションカード共通 */
  .sec-card {
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    text-align: left;
  }
  .sec-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .sec-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .sec-title {
    font-size: 13px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.5px;
  }

  /* 有名人カード */
  .sec-famous { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); }
  .sec-famous .sec-icon { background: rgba(255,215,0,0.15); }
  .famous-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .famous-item {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
  }

  /* 恋愛・仕事・お金 */
  .sec-life { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); }
  .sec-life .sec-icon { background: rgba(236,72,153,0.15); }
  .life-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .life-item {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
  }
  .life-emoji { font-size: 22px; margin-bottom: 6px; }
  .life-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 6px; letter-spacing: 1px; }
  .life-text { font-size: 11px; color: rgba(255,255,255,0.8); line-height: 1.5; text-align: left; }

  /* NG */
  .sec-ng { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); }
  .sec-ng .sec-icon { background: rgba(239,68,68,0.2); }
  .sec-ng .sec-title { color: #f87171; }
  .ng-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(239,68,68,0.1);
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
  }
  .ng-item:last-child { border-bottom: none; padding-bottom: 0; }
  .ng-badge {
    flex-shrink: 0;
    background: rgba(239,68,68,0.2);
    color: #f87171;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 2px;
  }

  /* 実践カード */
  .sec-practice { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); }
  .sec-practice .sec-icon { background: rgba(34,197,94,0.15); }
  .practice-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    line-height: 1.6;
  }
  .practice-item:last-child { border-bottom: none; padding-bottom: 0; }
  .practice-num {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(34,197,94,0.2);
    color: #4ade80;
    font-size: 11px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  .retry-btn {
    width: calc(100% - 40px);
    margin: 20px 20px 0;
    padding: 16px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .retry-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

  .credit {
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    margin-top: 20px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">

  <!-- COVER -->
  <div id="cover">
    <img src="line_oa_chat_260613_110628.jpg" alt="表紙" style="width:100%;border-radius:16px;margin-bottom:20px;display:block;">
    <div class="cover-title">あなたの「勇者・姫・魔法使い」<br>タイプ診断</div>
    <div class="cover-sub">
      こうすれば開運する！という生き方は<br>
      もしかしたら間違いだったかもしれない。<br>
      あなたが「勇者」「姫」「魔法使い」どのチャンネルで<br>
      人生を加速させるタイプなのかを診断します。
    </div>
    <div class="type-preview">
      <div class="type-card fire">
        <div class="emoji">🔥</div>
        <div class="name">勇者タイプ</div>
        <div class="desc">炎の属性<br>幸運掴み型</div>
      </div>
      <div class="type-card water">
        <div class="emoji">💧</div>
        <div class="name">お姫様タイプ</div>
        <div class="desc">水の属性<br>幸運集まる型</div>
      </div>
      <div class="type-card both">
        <div class="emoji">🧙</div>
        <div class="name">魔法使いタイプ</div>
        <div class="desc">統合の属性<br>稀少タイプ</div>
      </div>
    </div>
    <button class="start-btn" onclick="startQuiz()">診断スタート（全15問）</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-label">QUESTION</span>
        <span class="progress-count" id="progress-count">1 / 8</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div id="question-card" class="question-card"></div>
  </div>

  <!-- RESULT -->
  <div id="result"></div>

</div>

<script>
const questions = [
  {
    img: "line_oa_chat_260613_111953.jpg",
    text: "困難な壁にぶつかったとき、あなたはどちらに近いですか？",
    choices: [
      { text: "むしろ燃える。壁があるほどエネルギーが湧いてくる", type: "fire" },
      { text: "流れに逆らわず、助けや転機が来るのを信じて待つ", type: "water" }
    ]
  },
  {
    img: "line_oa_chat_260613_110825.jpg",
    text: "行動を決めるとき、あなたが重視するのは？",
    choices: [
      { text: "「何をやるか」。明確な目標を決めて突き進む", type: "fire" },
      { text: "「何をやらないか」。心地よくないことは手放す", type: "water" }
    ]
  },
  {
    img: "ChatGPT Image 2026年6月13日 11_25_54.png",
    text: "エネルギーが満ちるのはどんなとき？",
    choices: [
      { text: "プレッシャーを乗り越えたとき、使命感が満たされたとき", type: "fire" },
      { text: "楽しくて感動して、幸せが自然とあふれているとき", type: "water" }
    ]
  },
  {
    img: "line_oa_chat_260613_110830.jpg",
    text: "人生でよかったことを振り返ると、どちらが多い？",
    choices: [
      { text: "自分の意志と努力で切り拓いてきた", type: "fire" },
      { text: "不思議なタイミングで助けや縁に恵まれてきた", type: "water" }
    ]
  },
  {
    img: "line_oa_chat_260613_112102.jpg",
    text: "服や寝具などの「肌触り」について、あなたは？",
    choices: [
      { text: "あまり気にしない。機能重視で選ぶ", type: "fire" },
      { text: "肌触りはとても大事。心地よさにはこだわりたい", type: "water" }
    ]
  },
  {
    img: "line_oa_chat_260613_112249.jpg",
    text: "周りからどう見られることが多い？",
    choices: [
      { text: "頼れる、責任感が強い、行動力がある", type: "fire" },
      { text: "癒される、純粋、なんか気になる存在", type: "water" }
    ]
  },
  {
    img: "line_oa_chat_260613_110848.jpg",
    text: "SNSや会話でよくやるアウトプットは？",
    choices: [
      { text: "目標・学び・気づきなど、自分の成長ストーリーを語る", type: "fire" },
      { text: "感動・感謝・うれしかった瞬間を素直にシェアする", type: "water" }
    ]
  },
  {
    img: "line_oa_chat_260613_110854.jpg",
    text: "「運がいい」と言われるとしたら、それはどんなとき？",
    choices: [
      { text: "努力が報われた瞬間、恩のある人に助けてもらったとき", type: "fire" },
      { text: "何もしていないのに良い縁や機会が向こうからやってきたとき", type: "water" }
    ]
  },
  {
    img: "ChatGPT Image 2026年6月13日 12_23_57.png",
    text: "新しいことを始めるとき、どちらに近い？",
    choices: [
      { text: "計画を立てて、準備が整ったら動く", type: "fire" },
      { text: "直感で「これだ！」と感じたらすぐ動く", type: "water" }
    ]
  },
  {
    img: "ChatGPT Image 2026年6月13日 12_24_26.png",
    text: "友人・仲間との関係について、あなたは？",
    choices: [
      { text: "恩義と絆を大切にする。昔からの仲間を大事にする", type: "fire" },
      { text: "不思議な縁で自然と人が集まってくる", type: "water" }
    ]
  },
  {
    img: "ChatGPT Image 2026年6月13日 12_24_43.png",
    text: "休日の過ごし方に近いのは？",
    choices: [
      { text: "自己投資・スキルアップ・目標に向けた行動をしたい", type: "fire" },
      { text: "心地よさを最優先。好きなことだけしていたい", type: "water" }
    ]
  },
  {
    img: "ChatGPT Image 2026年6月13日 12_26_59.png",
    text: "お金を使うとき、どちらが多い？",
    choices: [
      { text: "成長・投資・事業など、未来の自分のために使う", type: "fire" },
      { text: "感動・心地よさ・好きなものに直感で使う", type: "water" }
    ]
  },
  {
    img: "ChatGPT Image 2026年6月13日 12_33_21.png",
    text: "チャンスが目の前に来たとき、あなたは？",
    choices: [
      { text: "自分からつかみにいく。逃さないよう行動する", type: "fire" },
      { text: "流れに乗る。自然に引き寄せられた感覚がある", type: "water" }
    ]
  },
  {
    img: "ChatGPT Image 2026年6月13日 12_46_46.png",
    text: "落ち込んだとき、どうやって回復する？",

let scores = { fire: 0, water: 0 };
let current = 0;
let answered = false;

function startQuiz() {
  document.getElementById("cover").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;
  document.getElementById("progress-count").textContent = `${current + 1} / ${total}`;
  document.getElementById("progress-fill").style.width = `${(current / total) * 100}%`;

  const card = document.getElementById("question-card");
  card.innerHTML = `
    ${q.img ? `<img src="${encodeURI(q.img)}" alt="Q${current+1}" style="width:100%;border-radius:12px;margin-bottom:16px;display:block;">` : ""}
    <span class="question-num">Q${current + 1}</span>
    <div class="question-text">${q.text}</div>
    <div class="choices">
      ${q.choices.map((c, i) => `
        <button class="choice-btn" onclick="selectAnswer('${c.type}', this)">
          <span class="choice-letter">${String.fromCharCode(65 + i)}</span>
          <span>${c.text}</span>
        </button>
      `).join("")}
    </div>
  `;
}

function selectAnswer(type, btn) {
  if (answered) return;
  answered = true;

  scores[type]++;
  btn.classList.add(`selected-${type}`);

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  document.getElementById("quiz").style.display = "none";
  const resultEl = document.getElementById("result");
  resultEl.style.display = "block";

  let typeKey;
  const diff = scores.fire - scores.water;
  if (diff >= 3) typeKey = "fire";
  else if (diff <= -3) typeKey = "water";
  else typeKey = "both";

  const r = results[typeKey];
  const firePercent = Math.round((scores.fire / questions.length) * 100);

  const waterPercent = 100 - firePercent;

  resultEl.innerHTML = `
    <div class="result-card ${r.type}">

      <!-- ヒーローエリア -->

        ${r.img ? `<img src="${r.img}" alt="${r.name}">` : ""}

function retryQuiz() {
  scores = { fire: 0, water: 0 };
  current = 0;
  answered = false;
  document.getElementById("result").style.display = "none";
